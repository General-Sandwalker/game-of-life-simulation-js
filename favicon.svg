<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4caf50" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4caf50" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow -->
  <ellipse cx="32" cy="32" rx="30" ry="30" fill="url(#glow)"/>
  <!-- Blob body (organic shape) -->
  <path d="M32 6 C46 6 58 17 58 32 C58 47 47 58 32 58 C17 58 6 47 6 32 C6 17 18 6 32 6 Z" fill="url(#bg)"/>
  <!-- DNA helix strands -->
  <path d="M22 20 Q32 26 42 20" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M22 28 Q32 34 42 28" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M22 36 Q32 42 42 36" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Vertical connectors -->
  <line x1="22" y1="20" x2="22" y2="36" stroke="#fff" stroke-width="1.6" opacity="0.5"/>
  <line x1="42" y1="20" x2="42" y2="36" stroke="#fff" stroke-width="1.6" opacity="0.5"/>
  <!-- Rungs -->
  <line x1="26" y1="21.5" x2="26" y2="26" stroke="#fff" stroke-width="1.4" opacity="0.6"/>
  <line x1="32" y1="24.5" x2="32" y2="29" stroke="#fff" stroke-width="1.4" opacity="0.6"/>
  <line x1="38" y1="21.5" x2="38" y2="26" stroke="#fff" stroke-width="1.4" opacity="0.6"/>
  <line x1="26" y1="30" x2="26" y2="34.5" stroke="#fff" stroke-width="1.4" opacity="0.6"/>
  <line x1="32" y1="33" x2="32" y2="37.5" stroke="#fff" stroke-width="1.4" opacity="0.6"/>
  <line x1="38" y1="30" x2="38" y2="34.5" stroke="#fff" stroke-width="1.4" opacity="0.6"/>
</svg>
